<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <!-- Content will be dynamically inserted here -->
    </div>

    <div class="chat-sidebar">
        <div class="chat-sidebar-header">
            <h2>Messages</h2>
        </div>
        <div class="chat-users-container">
            <ul class="chat-user-list">
                <li class="chat-user-item">
                    <div class="chat-user-avatar">
                        <img src="user-avatar.jpg" alt="User Name">
                        <span class="chat-user-status status-online"></span>
                    </div>
                    <div class="chat-user-info">
                        <div class="chat-user-name">User Name</div>
                        <div class="chat-last-message">Last message preview...</div>
                    </div>
                    <div class="chat-message-meta">
                        <span class="chat-time">12:30</span>
                        <span class="chat-unread-count">2</span>
                    </div>
                </li>
                <!-- More user items... -->
            </ul>
        </div>
    </div>

    <!-- Note the type="module" and correct path -->
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum</title>
    <link rel="icon" type="image/jpeg" href="/static/images/icon.jpeg">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/features-chat.css">
    <link rel="stylesheet" href="/static/css/features-posts.css">
    <link rel="stylesheet" href="/static/css/features-auth-profile.css">
    <!--<link rel="stylesheet" href="/static/css/features.css">-->

</head>
<body>
  <div id="app">
    <!-- Content will be dynamically inserted here -->
  </div>
  <!-- Add missing container -->
  <div class="chat-users-container">
    <ul id="chat-user-list" class="chat-user-list"></ul>
  </div>
</div>

<!-- Chat Window -->
<div class="chat-window">
    <div id="chat-header"></div>

    <div id="chat-messages" class="chat-messages"></div>

    <!-- Typing Indicator -->
    <div class="typing-indicator"></div>

    <!-- Message Input Form -->
    <form class="message-input-form" id="chat-message-form">
        <input type="text" class="message-input" placeholder="Type a message..." />
        <button type="submit" class="send-button">Send</button>
    </form>
</div>

  <!-- Scripts -->
  <script type="module" src="/static/js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>API Test</h1>
    <div id="result"></div>

    <script>
        async function testAPI() {
            try {
                // Test endpoint
                const testResponse = await fetch('http://localhost:8080/api/test');
                const testData = await testResponse.json();
                console.log('Test response:', testData);

                // Posts endpoint
                const postsResponse = await fetch('http://localhost:8080/api/posts');
                const postsData = await postsResponse.json();
                console.log('Posts response:', postsData);

                document.getElementById('result').innerHTML = 
                    `Test: ${JSON.stringify(testData)}<br>Posts: ${JSON.stringify(postsData)}`;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = `Error: ${error.message}`;
            }
        }

        testAPI();
    </script>
</body>
</html>
